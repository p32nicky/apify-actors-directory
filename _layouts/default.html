<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="keywords" content="web scraping, API, automation, scrapers, data extraction, apify, tools">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  {% feed_meta %}
  {% seo %}

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --orange: #d29922;
      --cta-bg: #238636;
      --cta-hover: #2ea043;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

    /* Header */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .site-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }
    .site-title:hover { color: var(--accent); text-decoration: none; }
    .site-nav a {
      margin-left: 24px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .site-nav a:hover { color: var(--text); text-decoration: none; }

    /* Main */
    main { padding: 40px 0; min-height: 60vh; }

    /* CTA Button */
    .cta-btn {
      display: inline-block;
      background: var(--cta-bg);
      color: #fff !important;
      padding: 12px 28px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none !important;
      transition: background 0.2s;
    }
    .cta-btn:hover { background: var(--cta-hover); }
    .cta-btn-lg { padding: 16px 36px; font-size: 1.15rem; }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin: 24px 0;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }
    .card h3 { margin-bottom: 8px; font-size: 1.1rem; }
    .card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 12px; }
    .card .meta { font-size: 0.85rem; color: var(--text-muted); }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.9rem;
    }
    th, td {
      padding: 10px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    th { background: var(--surface); font-weight: 600; }
    tr:hover { background: rgba(88,166,255,0.05); }

    /* Blog posts */
    .post-list { list-style: none; }
    .post-list li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .post-list li:hover { border-color: var(--accent); }
    .post-title { font-size: 1.2rem; font-weight: 600; }
    .post-meta { color: var(--text-muted); font-size: 0.85rem; margin: 6px 0 10px; }
    .post-excerpt { color: var(--text-muted); font-size: 0.95rem; }

    /* Article */
    .article-content { max-width: 800px; }
    .article-content h1 { font-size: 2rem; margin-bottom: 8px; }
    .article-content h2 { font-size: 1.5rem; margin: 32px 0 12px; color: var(--accent); }
    .article-content h3 { font-size: 1.2rem; margin: 24px 0 8px; }
    .article-content p { margin-bottom: 16px; }
    .article-content ul, .article-content ol { margin: 0 0 16px 24px; }
    .article-content li { margin-bottom: 6px; }
    .article-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .article-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      color: var(--text-muted);
      margin: 16px 0;
    }
    .article-content strong { color: var(--text); }

    /* Hero */
    .hero {
      text-align: center;
      padding: 60px 0 40px;
    }
    .hero h1 { font-size: 2.5rem; margin-bottom: 16px; }
    .hero p { font-size: 1.2rem; color: var(--text-muted); max-width: 700px; margin: 0 auto 24px; }

    /* Footer */
    .site-footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 32px 0;
      margin-top: 60px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .site-footer a { color: var(--accent); }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 2rem; font-weight: 700; color: var(--green); }
    .stat-label { font-size: 0.85rem; color: var(--text-muted); }

    @media (max-width: 640px) {
      .hero h1 { font-size: 1.8rem; }
      .card-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 20px; }
      .stat-num { font-size: 1.5rem; }
      table { font-size: 0.8rem; }
      th, td { padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">API Finder</a>
      <nav class="site-nav">
        <a href="{{ '/directory/' | relative_url }}">Directory</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="https://www.apify.com/?fpr=97nrp4">Get Started Free</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p><a href="https://www.apify.com/?fpr=97nrp4">Sign up for Apify</a> — $5/month free credits for every new account</p>
      <p style="margin-top:8px;">Built with data from <a href="https://www.apify.com/?fpr=97nrp4">Apify</a> | <a href="https://github.com/p32nicky/apify-actors-directory">GitHub</a></p>
    </div>
  </footer>
</body>
</html>
